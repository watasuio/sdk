name: Release SDKs

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version tag to release, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: sdk-release
  cancel-in-progress: false

jobs:
  release:
    name: Release SDK packages
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Validate dispatch
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Release workflow must run from main, got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          if ! printf '%s' "${{ inputs.version }}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Version must look like v1.0.0" >&2
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Refuse duplicate version tag
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${{ inputs.version }}" >/dev/null; then
            echo "Tag already exists: ${{ inputs.version }}" >&2
            exit 1
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: ts/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Prepare version bump
        run: node scripts/prepare-release.mjs '${{ inputs.version }}'

      - name: Install Python build tools
        run: python -m pip install --upgrade build hatchling pytest requests websocket-client

      - name: Test Python SDK
        run: |
          python -m pytest -q
          python -m compileall -q python tests

      - name: Test TypeScript SDK
        working-directory: ts
        run: |
          npm ci
          npm test

      - name: Test Rust SDK
        working-directory: rust
        run: |
          cargo fmt --all --check
          cargo test
          cargo check --no-default-features
          cargo check --no-default-features --features native-tls
          cargo check --no-default-features --features rustls-tls-native-roots
          cargo doc --no-deps
          cargo publish --dry-run

      - name: Commit release bump and tag
        run: |
          set -euo pipefail
          git config user.name 'watasu.io'
          git config user.email 'watasu@watasu.io'
          git add pyproject.toml rust/Cargo.toml rust/Cargo.lock ts/package.json ts/package-lock.json
          git commit -m "chore(release): ${{ inputs.version }}"
          git tag -a "${{ inputs.version }}" -m "${{ inputs.version }}"
          git push origin HEAD:main
          git push origin "${{ inputs.version }}"

      - name: Build Python package
        run: python -m build

      - name: Publish Python package
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish TypeScript package
        working-directory: ts
        run: npm publish --access public

      - name: Authenticate crates.io trusted publisher
        id: crates_auth
        uses: rust-lang/crates-io-auth-action@v1
        continue-on-error: true

      - name: Publish Rust package with trusted publisher
        if: steps.crates_auth.outcome == 'success'
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates_auth.outputs.token }}
        run: cargo publish

      - name: Publish Rust package with fallback token
        if: steps.crates_auth.outcome != 'success'
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "Configure crates.io trusted publishing or set CARGO_REGISTRY_TOKEN." >&2
            exit 1
          fi
          cargo publish
